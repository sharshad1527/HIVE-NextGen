<?xml version="1.0" standalone="no"?>
<svg id="svg-app-icon" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <!-- Background Gradient -->
                        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#1A1A1A"/>
                            <stop offset="100%" stop-color="#050505"/>
                        </linearGradient>
                        
                        <!-- Pillar Gradient (Orange) -->
                        <linearGradient id="pillarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#FF8A00"/>
                            <stop offset="100%" stop-color="#E52E00"/>
                        </linearGradient>

                        <!-- Play Button Gradient (Dark) -->
                        <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#2D2D2D"/>
                            <stop offset="100%" stop-color="#0A0A0A"/>
                        </linearGradient>

                        <!-- Subtle Drop Shadow for layering -->
                        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="8" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
                        </filter>

                        <!-- Glow Effect for Play Button -->
                        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
                            <feGaussianBlur stdDeviation="16" result="blur"/>
                            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                        </filter>
                    </defs>

                    <!-- App Icon Base -->
                    <rect x="0" y="0" width="512" height="512" rx="115" fill="url(#bgGrad)"/>
                    <rect x="2" y="2" width="508" height="508" rx="113" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="4"/>

                    <!-- Technical Hive Background (Hexagons) -->
                    <g opacity="0.4" transform="translate(256, 256) scale(1.25) translate(-256, -256)">
                        <polygon points="256,76 411.8,166 411.8,346 256,436 100.2,346 100.2,166" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="6" stroke-linejoin="round"/>
                        <polygon points="256,116 377.1,186 377.1,326 256,396 134.9,326 134.9,186" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="3" stroke-linejoin="round"/>
                    </g>

                    <!-- Main Logo Mark (Italic/Skewed) -->
                    <g id="logo-mark" transform="translate(256, 256) scale(1.05) skewX(-15) translate(-256, -256)">
                        <!-- Right Pillar -->
                        <rect x="308" y="126" width="64" height="260" rx="32" fill="url(#pillarGrad)"/>
                        
                        <!-- Middle Play Triangle -->
                        <!-- Points adjusted to properly overlap and look mathematically satisfying -->
                        <path d="M 190 206 L 330 256 L 190 306 Z" fill="url(#playGrad)" filter="url(#glow)" stroke="url(#pillarGrad)" stroke-width="24" stroke-linejoin="round"/>
                        
                        <!-- Left Pillar (On top to create interlocking 3D effect) -->
                        <rect x="140" y="126" width="64" height="260" rx="32" fill="url(#pillarGrad)" filter="url(#shadow)"/>
                    </g>
                </svg>